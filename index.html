<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>My Future Me</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07091A">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body,#mfm{font-variant-numeric:tabular-nums;font-feature-settings:'tnum' 1,'lnum' 1}
.num{font-family:'Plus Jakarta Sans',sans-serif!important;font-variant-numeric:tabular-nums;font-feature-settings:'tnum' 1,'lnum' 1;letter-spacing:0!important;line-height:1!important;display:inline-flex;align-items:center;justify-content:center;font-weight:800}
body{background:#0B0E14;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:20px;font-family:'Plus Jakarta Sans',sans-serif}
#mfm{
  --fd:'Syne',sans-serif;--fb:'Plus Jakarta Sans',sans-serif;
  max-width:390px;width:100%;position:relative;
  /* DARK (default) */
  --bg:#0B0E14;--su:#12161F;--ca:#161B26;--bo:#232A38;--bh:#2E3645;
  --ac:#5B8DEF;--ac2:#6BA5FF;--go:#E0A33E;--tx:#EAEEF5;--so:#9AA6BC;--mu:#5A6478;
  --gr:#3DD68C;--pu:#9B8AFB;--cy:#4EC5E0;--rd:#F06B6B;
}
#mfm[data-theme="light"]{
  --bg:#F6F8FB;--su:#FFFFFF;--ca:#FFFFFF;--bo:#E4E9F0;--bh:#D2DAE6;
  --ac:#3A6FD8;--ac2:#3A6FD8;--go:#C8861A;--tx:#1A2230;--so:#5A6478;--mu:#9AA6BC;
  --gr:#1FAF6B;--pu:#7A66E8;--cy:#1F9FC0;--rd:#DC4B4B;
}
.ph{background:var(--bg);border-radius:22px;overflow:hidden;border:1px solid rgba(255,255,255,.06);color:var(--tx);-webkit-font-smoothing:antialiased;height:700px;display:flex;flex-direction:column;position:relative}
.sb{padding:10px 16px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bo);flex-shrink:0}
.logo{font-family:var(--fd);font-weight:800;font-size:13px;letter-spacing:3px;color:var(--ac)}
#upg-btn{background:linear-gradient(90deg,#6B7CFF,#B07AFF,#F5A623,#6B7CFF);background-size:300% 100%;animation:gs 3s linear infinite;border:none;border-radius:20px;padding:3px 11px;font-size:10px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:.5px;font-family:var(--fb)}
@keyframes gs{0%{background-position:0%}100%{background-position:300%}}
.sc{flex:1;min-height:0;padding:14px 14px 8px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.nv{background:var(--su);border-top:1px solid var(--bo);padding:8px 4px 14px;display:flex;justify-content:space-around;flex-shrink:0}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;padding:4px 8px;opacity:.28;color:var(--mu)}
.nb.on{opacity:1}
.ni{font-size:18px}.nl{font-size:9px;font-family:var(--fb);font-weight:600;letter-spacing:.5px;color:var(--mu)}.nb.on .nl{color:var(--ac)}
.ca{background:var(--ca);border-radius:14px;border:1px solid var(--bo);padding:14px;margin-bottom:10px}
.al{border-left:2px solid var(--ac)!important;border-color:rgba(107,124,255,.2)!important}
.gl{border-left:2px solid var(--gr)!important;border-color:rgba(45,212,160,.2)!important}
.pl{border-left:2px solid var(--pu)!important;border-color:rgba(176,122,255,.2)!important}
.yl{border-left:2px solid var(--go)!important;border-color:rgba(245,166,35,.2)!important}
.cl{border-left:2px solid var(--cy)!important;border-color:rgba(56,200,245,.2)!important}
.lb{font-size:10px;font-weight:700;letter-spacing:2px;margin-bottom:8px;color:var(--mu)}
.h2{font-family:var(--fd);font-weight:700;font-size:18px;letter-spacing:-.3px;line-height:1.3;margin-bottom:12px}
.stk{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.18);border-radius:16px;padding:13px 16px;display:flex;align-items:center;gap:14px;margin-bottom:10px}
.cr{border-radius:13px;padding:11px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px;border:1px solid var(--bo);background:var(--ca);cursor:pointer}
.cr.dn{background:rgba(45,212,160,.06);border-color:rgba(45,212,160,.16);cursor:default}
.bt{width:100%;padding:13px 16px;border-radius:13px;font-family:var(--fb);font-weight:600;font-size:14px;cursor:pointer;border:none;margin-bottom:8px;letter-spacing:.2px}
.btp{background:linear-gradient(135deg,#6B7CFF,#8B5CF6);color:#fff}
.btg{background:linear-gradient(135deg,#2DD4A0,#1FAF80);color:#000}
.btc{background:linear-gradient(135deg,#38C8F5,#1AAFD8);color:#000}
.bto{background:linear-gradient(135deg,#F5A623,#E08800);color:#000}
.bt:disabled{opacity:.4;cursor:not-allowed}
.ta{width:100%;background:var(--su);border:1px solid var(--bo);border-radius:13px;padding:13px 15px;color:var(--tx);font-family:var(--fb);font-size:13px;line-height:1.65;resize:vertical;outline:none;min-height:110px}
.inp{width:100%;background:var(--su);border:1px solid var(--bo);border-radius:10px;padding:9px 12px;color:var(--tx);font-family:var(--fb);font-size:13px;outline:none;margin-bottom:8px}
.ti{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--bo)}.ti:last-child{border-bottom:none}
.cb{width:19px;height:19px;border-radius:5px;border:2px solid var(--bo);cursor:pointer;flex-shrink:0;margin-top:2px;background:transparent;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s}
.cb.ck{background:var(--gr);border-color:var(--gr);animation:cbp .22s ease}
@keyframes cbp{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(1)}}
.pb{height:3px;background:var(--bo);border-radius:99px;overflow:hidden}
.pf{height:100%;border-radius:99px;transition:width .4s}
.bk{background:none;border:none;color:var(--mu);cursor:pointer;font-family:var(--fb);font-size:13px;padding:0 0 14px;display:flex;align-items:center;gap:5px}
.rtb{padding:6px 10px;border-radius:9px;border:1px solid var(--bo);background:var(--ca);color:var(--mu);font-family:var(--fb);font-size:11px;font-weight:600;cursor:pointer}
.rtb.on{background:rgba(107,124,255,.1);border-color:rgba(107,124,255,.28);color:var(--ac)}
.dr{display:flex;align-items:center;gap:5px;padding:7px 0;border-bottom:1px solid var(--bo);font-size:12px;color:var(--so)}.dr:last-child{border-bottom:none}
.mt{display:flex;gap:8px;margin-bottom:12px}
.mtb{flex:1;padding:12px 8px;border-radius:12px;border:1px solid var(--bo);background:var(--ca);cursor:pointer;text-align:center;font-family:var(--fb);color:var(--tx)}
.mtb.on{border-color:rgba(107,124,255,.35);background:rgba(107,124,255,.08)}
.mood-row{display:flex;justify-content:space-between;gap:4px;margin-bottom:10px}
.mb{flex:1;background:var(--su);border:2px solid transparent;border-radius:11px;font-size:20px;padding:7px 4px;cursor:pointer;text-align:center;transition:transform .15s,border-color .15s}
.mb.on{border-color:var(--ac);background:rgba(107,124,255,.1);transform:scale(1.1)}
.hb{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--bo)}.hb:last-child{border-bottom:none}
.slp{background:var(--su);border:1px solid var(--bo);border-radius:10px;padding:7px 10px;color:var(--tx);font-family:var(--fb);font-size:13px;outline:none;width:88px;text-align:center}
.bdg{display:inline-flex;align-items:center;gap:5px;border-radius:18px;padding:5px 10px;margin:3px 3px 0;font-size:11px;font-weight:600;border:1px solid var(--bo);background:var(--su);color:var(--mu);opacity:.35}
.bdg.on{background:rgba(245,166,35,.08);border-color:rgba(245,166,35,.3);color:var(--go);opacity:1}
.done-banner{background:linear-gradient(135deg,rgba(45,212,160,.12),rgba(107,124,255,.12));border:1px solid rgba(45,212,160,.3);border-radius:14px;padding:13px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;animation:si .3s ease}
@keyframes si{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.shb{background:rgba(56,200,245,.08);border:1px solid rgba(56,200,245,.25);border-radius:10px;padding:7px 12px;cursor:pointer;font-family:var(--fb);font-size:11px;color:var(--cy);font-weight:600;margin-top:6px;width:100%}
.shb:disabled{opacity:.35;cursor:not-allowed}
/* Timer */
.tw{background:var(--su);border:1px solid var(--bo);border-radius:16px;padding:16px;margin-bottom:10px}
.tr{transform:rotate(-90deg);transform-origin:50% 50%}
#ta{transition:stroke-dashoffset .8s linear}
.tb{padding:10px 20px;border-radius:10px;font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;border:none;margin:3px}
.ts{background:linear-gradient(135deg,#6B7CFF,#8B5CF6);color:#fff}
.tp{background:rgba(255,107,117,.15);border:1px solid rgba(255,107,117,.3)!important;color:var(--rd)}
.tsel{background:var(--su);border:1px solid var(--bo);border-radius:8px;padding:7px 10px;color:var(--tx);font-family:var(--fb);font-size:12px;outline:none;width:100%;margin-bottom:10px}
/* Wave */
#wbtn{background:none;border:none;cursor:pointer;font-size:24px;padding:0;line-height:1;display:inline-block}
#wbtn.w{animation:wv .65s ease}
@keyframes wv{0%{transform:rotate(0)}15%{transform:rotate(22deg)}30%{transform:rotate(-18deg)}45%{transform:rotate(20deg)}60%{transform:rotate(-12deg)}75%{transform:rotate(15deg)}90%{transform:rotate(-6deg)}100%{transform:rotate(0)}}
.wf{position:fixed;pointer-events:none;font-size:22px;animation:wfu .9s ease-out forwards;z-index:10001}
@keyframes wfu{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-65px) scale(1.5)}}
/* Onboarding */
.ob{display:flex;flex-direction:column;min-height:100%;justify-content:space-between;padding:8px 0 16px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--bo)}
.dot.on{background:var(--ac)}
/* Upgrade overlay inside .ph */
#uov{position:absolute;inset:0;z-index:9000;background:rgba(7,9,26,.95);backdrop-filter:blur(4px);display:none;flex-direction:column;padding:14px;overflow-y:auto}
#uov.open{display:flex}
.pc{border-radius:16px;padding:16px;margin-bottom:10px;width:100%;border:1px solid var(--bo);background:var(--ca)}
.pc.pr{border-color:rgba(245,166,35,.35);background:linear-gradient(135deg,rgba(245,166,35,.05),rgba(176,122,255,.05))}
.fr{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;color:var(--mu)}
.fr.ok{color:var(--so)}
/* Tutorial bottom sheet (fixed, outside .ph) */
#tut-back{position:fixed;inset:0;z-index:8090;display:none;cursor:pointer}
#tut-back.open{display:block}
#tut-sheet.open{display:block!important}
.tcard{background:rgba(10,13,30,.97);border:2px solid var(--ac);border-radius:20px;padding:20px;box-shadow:0 0 50px rgba(107,124,255,.45),0 16px 60px rgba(0,0,0,.8)}
/* Tutorial highlight: element itself gets subtle pulse while canvas creates the dark surround */
.tut-hi{animation:thi 1.8s ease-in-out infinite!important;border-radius:14px!important;position:relative!important}
@keyframes thi{0%,100%{filter:brightness(1.0)}55%{filter:brightness(1.22)}}
/* KI-Denk-Animation: atmende Puls-Welle (passt zum ruhigen Reflexions-Vibe) */
.think{position:relative;width:84px;height:84px;margin:0 auto 22px}
.think .core{position:absolute;inset:34px;border-radius:50%;background:radial-gradient(circle,var(--ac),var(--pu));box-shadow:0 0 24px var(--ac);animation:tcore 2.4s ease-in-out infinite}
.think .ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid var(--ac);opacity:0;animation:tring 2.4s ease-out infinite}
.think .ring:nth-child(2){animation-delay:.8s}
.think .ring:nth-child(3){animation-delay:1.6s}
@keyframes tcore{0%,100%{transform:scale(.82);opacity:.85}50%{transform:scale(1.08);opacity:1}}
@keyframes tring{0%{transform:scale(.4);opacity:.7}100%{transform:scale(1);opacity:0}}
.tut-nb{background:rgba(107,124,255,.18)!important;border-radius:10px!important;outline:2px solid var(--ac)!important;outline-offset:3px!important;opacity:1!important}
/* Tutorial interaction blocker — sits above content, below tutorial card */
#tut-block{position:absolute;inset:0;z-index:8050;display:none;cursor:default;background:transparent}
#tut-block.on{display:block}
/* Rank modal */
#rank-ov{position:absolute;inset:0;z-index:9000;background:rgba(7,9,26,.96);backdrop-filter:blur(4px);display:none;flex-direction:column;padding:16px;overflow-y:auto}
#rank-ov.open{display:flex}
.rank-row{border-radius:14px;padding:14px;margin-bottom:8px;border:1px solid var(--bo);background:var(--ca);display:flex;align-items:center;gap:14px}
.rank-row.cur{border-color:rgba(107,124,255,.45);background:rgba(107,124,255,.08);box-shadow:0 0 20px rgba(107,124,255,.2)}
/* Notif time input */
.ntime{background:var(--su);border:1px solid var(--bo);border-radius:8px;padding:5px 8px;color:var(--tx);font-size:12px;outline:none;font-family:var(--fb);width:78px;text-align:center}
.ntime:focus{border-color:var(--ac)};border:1px solid rgba(245,166,35,.25);border-radius:13px;padding:13px;margin-bottom:12px}
#kb input{width:100%;background:var(--su);border:1px solid rgba(245,166,35,.35);border-radius:9px;padding:8px 11px;color:var(--tx);font-size:12px;margin-top:8px;outline:none;font-family:var(--fb)}
#kb button{margin-top:8px;padding:7px 14px;border-radius:9px;background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.35);color:#F5A623;cursor:pointer;font-size:12px;font-family:var(--fb);font-weight:600}
/* Insight card */
.insight{background:linear-gradient(135deg,rgba(107,124,255,.15),rgba(176,122,255,.10));border:1.5px solid rgba(107,124,255,.45);border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:0 0 26px rgba(107,124,255,.18);animation:si .4s ease}
.sqb{flex:1;background:var(--su);border:2px solid transparent;border-radius:11px;padding:9px 2px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:transform .15s,border-color .15s,background .15s}
.sqb.on{border-color:var(--cy);background:rgba(56,200,245,.12);transform:scale(1.06)}
.sqb svg{width:22px;height:22px}
.chip{padding:7px 11px;border-radius:18px;border:1px solid var(--bo);background:var(--su);color:var(--so);font-size:12px;cursor:pointer;font-family:var(--fb);margin:0 4px 6px 0;display:inline-flex;align-items:center;gap:5px}
.chip.on{border-color:var(--cy);background:rgba(56,200,245,.14);color:var(--cy);font-weight:600}
.chip svg{width:13px;height:13px;flex-shrink:0}
.mb svg{width:26px;height:26px}
.mb{display:flex;flex-direction:column;align-items:center;gap:4px}
.nb svg{width:20px;height:20px}
svg{display:block;width:100%;height:100%}
.sqb svg,.chip svg,.mb svg,.nb svg{width:auto;height:auto}
.sqb svg{width:22px;height:22px}.chip svg{width:13px;height:13px}.mb svg{width:26px;height:26px}.nb svg{width:20px;height:20px}
.wr-action{background:var(--su);border:1px solid var(--bo);border-left:3px solid var(--gr);border-radius:11px;padding:11px 13px;margin-bottom:8px}
/* empty state */
.es{display:flex;flex-direction:column;align-items:center;text-align:center;padding:32px 20px}
</style>
</head>
<body>
<div id="mfm">
  <div class="ph" id="ph">
    <div class="sb" id="sb" style="display:none">
      <span id="clk" style="font-size:12px;color:var(--mu);font-weight:600">00:00</span>
      <span class="logo">MFM</span>
      <button id="upg-btn">UPGRADE</button>
    </div>
    <div id="sc" class="sc"></div>
    <div id="nv" class="nv" style="display:none">
      <button class="nb" data-s="d"><span class="ni" data-ic="home"></span><span class="nl">Home</span></button>
      <button class="nb" data-s="t"><span class="ni" data-ic="sun"></span><span class="nl">Plan</span></button>
      <button class="nb" data-s="b"><span class="ni" data-ic="chart"></span><span class="nl">Berichte</span></button>
      <button class="nb" data-s="set"><span class="ni" data-ic="gear"></span><span class="nl">Profil</span></button>
    </div>
    <!-- Tutorial interaction blocker -->
    <div id="tut-block"></div>
    <!-- Rank modal -->
    <div id="rank-ov"></div>
    <!-- Tutorial card: absolute inside ph, never leaves screen -->
    <div id="tut-sheet" style="position:absolute;left:12px;right:12px;z-index:8600;display:none">
      <div class="tcard" id="tcard"></div>
    </div>
    <!-- Upgrade overlay -->
    <div id="uov"></div>
  </div>
  <!-- Tutorial backdrop (canvas handles dimming, this handles clicks) -->
  <div id="tut-back"></div>
</div>
<script>

// ── SVG ICON SYSTEM (schlank, modern, schnell) ──────────
const IC={
  // Mood faces (Energie/Stimmung) — Outline-Stil
  mood:(i,c)=>{
    const col=c||'currentColor';
    const faces=[
      // 0 sehr schlecht
      `<circle cx="12" cy="12" r="9"/><path d="M8 15.5c1-1.2 2.4-1.8 4-1.8s3 .6 4 1.8"/><line x1="9" y1="9.5" x2="9.5" y2="9.5"/><line x1="14.5" y1="9.5" x2="15" y2="9.5"/>`,
      // 1 schlecht
      `<circle cx="12" cy="12" r="9"/><line x1="8.5" y1="15" x2="15.5" y2="14"/><line x1="9" y1="9.5" x2="9.5" y2="9.5"/><line x1="14.5" y1="9.5" x2="15" y2="9.5"/>`,
      // 2 neutral
      `<circle cx="12" cy="12" r="9"/><line x1="8.5" y1="14.5" x2="15.5" y2="14.5"/><line x1="9" y1="9.5" x2="9.5" y2="9.5"/><line x1="14.5" y1="9.5" x2="15" y2="9.5"/>`,
      // 3 gut
      `<circle cx="12" cy="12" r="9"/><path d="M8 14c1 1.2 2.4 1.8 4 1.8s3-.6 4-1.8"/><line x1="9" y1="9.5" x2="9.5" y2="9.5"/><line x1="14.5" y1="9.5" x2="15" y2="9.5"/>`,
      // 4 super
      `<circle cx="12" cy="12" r="9"/><path d="M7.5 13.5c1.2 1.8 2.8 2.7 4.5 2.7s3.3-.9 4.5-2.7"/><line x1="8.5" y1="9" x2="10" y2="9"/><line x1="14" y1="9" x2="15.5" y2="9"/>`
    ];
    return `<svg viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${faces[i]}</svg>`;
  },
  energy:(i)=>{
    // Batterie-Level 0..4
    const fill=['#FF6B75','#F5A623','#F5A623','#2DD4A0','#2DD4A0'][i];
    const segs=i+1;
    let bars='';
    for(let k=0;k<5;k++){bars+=`<rect x="${4+k*3.2}" y="${14-k*0}" width="2.2" height="6" rx="1" fill="${k<segs?fill:'none'}" stroke="${k<segs?fill:'#47516E'}" stroke-width="1"/>`;}
    return `<svg viewBox="0 0 24 24" fill="none">${bars}<path d="M13 4l-3 6h3l-1 5" stroke="${fill}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`;
  },
  // UI line icons
  i:(name,c,w)=>{
    const col=c||'currentColor',sw=w||1.8;
    const P={
      home:`<path d="M3 11l9-8 9 8"/><path d="M5 9.5V20h14V9.5"/>`,
      sun:`<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/>`,
      chart:`<path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/>`,
      gear:`<circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/>`,
      moon:`<path d="M20 14.5A8 8 0 119.5 4 6.5 6.5 0 0020 14.5z"/>`,
      wave:`<path d="M5 12c1.5-2 3-2 4.5 0M9.5 12c1.5-2 3-2 4.5 0M14 12c1.5-2 3-2 4.5 0"/><circle cx="12" cy="6" r="2"/>`,
      flame:`<path d="M12 3c1 3-1.5 4-1.5 6.5A2.5 2.5 0 0012 12a3 3 0 003-3c2 1.5 3 4 3 6a6 6 0 11-12 0c0-3 2-5 3-7 .8-1.5 2-2.5 3-5z"/>`,

// Ziel-Archetypen — Hilfe für Nutzer ohne klare Vorstellung
// KI-basierte Ziel-Analyse: geht konkret aufs individuelle Ziel ein,
// fragt bei vagen Zielen nach, gibt fundierte (keine halluzinierten) Schritte
async function fetchGoalSuggestions(goal){
  const sys=`Du bist ein fundierter, ehrlicher Coach. Der Nutzer nennt sein Lebensziel. Antworte AUSSCHLIESSLICH mit einem JSON-Objekt, kein Text drumherum, keine Markdown-Zäune.

Schema:
{"clear": true/false, "principle": "...", "steps": ["...","...","...","..."], "question": "..."}

Vorgehen:
- Greife IMMER die konkreten, fassbaren Bestandteile des Ziels auf und nenne sie beim Namen. Beispiele: "nach Zypern auswandern" → Aufenthalt/Visum, Wohnsitz, Sprache, ortsunabhängiges Einkommen. "vom Trading leben" → konsistente Strategie, Risikomanagement, Journaling, Startkapital. "reich werden durch Trading und auswandern" ist KONKRET genug (clear=true) — behandle es als zusammengesetztes Ziel und gib Schritte zu den fassbaren Teilen.
- clear=true, wenn mindestens ein konkreter Weg erkennbar ist: "principle" = das nachgewiesene Grundprinzip für GENAU dieses Ziel (1-2 Sätze, ehrlich, ohne Garantien oder Reichtums-Versprechen). "steps" = 4 konkrete, täglich oder wöchentlich trackbare Handlungen, die wirklich in Richtung DIESES Ziels führen und die der Nutzer in einer Habit-App abhaken kann. "question"="".
- clear=false NUR wenn das Ziel rein abstrakt ohne jeden fassbaren Anker ist (z.B. nur "glücklich sein", nur "erfolgreich"): dann "question" = EINE konkrete Rückfrage zum Schärfen, "principle" = kurzer Hinweis warum, "steps"=[].
- Nenne keine erfundenen Zahlen, keine Versprechen wie "so wirst du reich". Bleib realistisch und beziehe dich wörtlich auf das, was der Nutzer geschrieben hat.
- Deutsch, Du-Form.`;
  const r=await ai([{role:'user',content:`Mein Ziel: ${goal}`}],sys,'claude-sonnet-4-6');
  if(r===null)return null;
  try{
    const clean=r.replace(/```json|```/g,'').trim();
    const obj=JSON.parse(clean);
    if(typeof obj.clear==='boolean')return obj;
    return null;
  }catch(e){console.log('goalSug parse fail:',e);return null;}
}

// Startet KI-Ziel-Analyse (einmal pro Ziel), aktualisiert State + Re-Render
async function triggerGoalSug(){
  const goal=S.profile.goal;
  if(!goal)return;
  if(S.goalSugFor===goal&&S.goalSug)return; // schon geladen für dieses Ziel
  S.goalSugLoading=true;S.goalSug=null;S.goalSugFor=goal;
  if(S.sc==='ob')R();
  const res=await fetchGoalSuggestions(goal);
  S.goalSugLoading=false;
  S.goalSug=res; // null → Fallback wird in rOb genutzt
  if(S.sc==='ob')R();
}

function getLevel(){
  const pts=S.streak*2+S.history.length*2+
    Math.round((S.history.reduce((a,h)=>a+h.s,0)/Math.max(1,S.history.length))/2)+
    (S.chDone?5:0)+(S.tmSessions*2);
  if(pts>=100)return{l:'Champion',ic:'👑',col:'#F5A623',pts,need:null,pct:100};
  if(pts>=60)return{l:'Elite',ic:'💎',col:'#B07AFF',pts,need:100-pts,pct:Math.round((pts-60)/40*100)};
  if(pts>=30)return{l:'Performer',ic:'⚡',col:'#6B7CFF',pts,need:60-pts,pct:Math.round((pts-30)/30*100)};
  if(pts>=10)return{l:'Builder',ic:'🔨',col:'#2DD4A0',pts,need:30-pts,pct:Math.round((pts-10)/20*100)};
  return{l:'Rookie',ic:'🌱',col:'#8B96BA',pts,need:10-pts,pct:Math.round(pts/10*100)};
}

  const prev=S.history.slice(-14,-7);
  const prevAvg=prev.length?((prev.reduce((a,h)=>a+h.s,0)/prev.length).toFixed(1)):null;

// Proxy-URL (Cloudflare Worker) — KI läuft hierüber, kein Key im Browser nötig
const PROXY_URL='https://mfm-proxy.gustav-business.workers.dev';
const APP_URL='https://gusto05.github.io/mfm-app/';
const AI_MODEL='claude-haiku-4-5';
let _lastAiError='';
async function ai(msgs,sys,model){
  const doFetch=async()=>{
    try{
      const fetchP=fetch(PROXY_URL,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:model||AI_MODEL,max_tokens:600,system:sys,messages:msgs})
      });
      const timeoutP=new Promise((_,rej)=>setTimeout(()=>rej(new Error('Zeitüberschreitung')),30000));
      const r=await Promise.race([fetchP,timeoutP]);
      const raw=await r.text();
      let d=null;try{d=JSON.parse(raw);}catch(e){}
      if(!r.ok){_lastAiError=(d&&d.error&&d.error.message)?d.error.message:('HTTP '+r.status+': '+raw.slice(0,160));return {ok:false};}
      _lastAiError='';
      return {ok:true,text:(d&&d.content&&d.content[0]&&d.content[0].text)?d.content[0].text:null};
    }catch(e){_lastAiError='Netzwerk: '+e.message;return {ok:false};}
  };
  let res=await doFetch();
  if(res.ok)return res.text;
  await new Promise(r=>setTimeout(r,800));
  res=await doFetch();
  if(res.ok)return res.text;
  console.log('ai error nach Retry:',_lastAiError);
  return null;
}

// SVG-Liniendiagramm der Score-Entwicklung
function lineChart(data, w, h, labels){
  if(data.length<2)return'';
  const axisW=20; // Platz für Y-Achsen-Beschriftung links
  const pad=8, left=axisW+4;
  const cw=w-left-pad, ch=h-pad*2;
  const max=10, min=0;
  const pts=data.map((v,i)=>{
    const x=left+(cw*i/(data.length-1));
    const y=pad+ch-(ch*(v-min)/(max-min));
    return [x,y,v];
  });
  const path=pts.map((p,i)=>`${i===0?'M':'L'}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
  const area=path+`L${pts[pts.length-1][0].toFixed(1)} ${(h-pad).toFixed(1)}L${left} ${(h-pad).toFixed(1)}Z`;
  const uid='lc'+Math.random().toString(36).slice(2,7);
  // Datenpunkte mit unsichtbarem großem Touch-Bereich + Tooltip-Daten
  const dots=pts.map((p,i)=>{
    const lbl=labels&&labels[i]?labels[i]:('Tag '+(i+1));
    return`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.8" fill="#6B7CFF"/>`+
      `<circle class="lc-hit" data-x="${p[0].toFixed(1)}" data-y="${p[1].toFixed(1)}" data-v="${p[2]}" data-l="${lbl}" cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="12" fill="transparent" style="cursor:pointer"/>`;
  }).join('');
  // Y-Achsen-Labels 0,5,10
  const yLabels=[0,5,10].map(v=>{const y=pad+ch-(ch*v/10);return`<text x="${axisW}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="8" fill="#5A6478" font-family="'Plus Jakarta Sans',sans-serif">${v}</text>`;}).join('');
  return`<div style="position:relative" id="${uid}">
  <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;display:block" data-chart="${uid}">
    <defs><linearGradient id="g${uid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6B7CFF" stop-opacity="0.28"/><stop offset="1" stop-color="#6B7CFF" stop-opacity="0"/></linearGradient></defs>
    ${[0,2.5,5,7.5,10].map(v=>{const y=pad+ch-(ch*v/10);return`<line x1="${left}" y1="${y.toFixed(1)}" x2="${w-pad}" y2="${y.toFixed(1)}" stroke="#1C2345" stroke-width="1"/>`;}).join('')}
    ${yLabels}
    <path d="${area}" fill="url(#g${uid})"/>
    <path d="${path}" fill="none" stroke="#6B7CFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line class="lc-vline" x1="0" y1="${pad}" x2="0" y2="${h-pad}" stroke="#6B7CFF" stroke-width="1" stroke-dasharray="3 3" style="opacity:0"/>
    ${dots}
  </svg>
  <div class="lc-tip" style="position:absolute;pointer-events:none;opacity:0;transform:translate(-50%,-130%);background:var(--ca);border:1px solid var(--ac);border-radius:8px;padding:4px 8px;font-size:11px;font-weight:700;color:var(--tx);white-space:nowrap;transition:opacity .12s;z-index:5"></div>
  </div>`;
}

// Aktiviert Tooltips für alle Charts auf der Seite
function bindCharts(){
  document.querySelectorAll('[data-chart]').forEach(svg=>{
    const wrap=svg.parentElement;
    const tip=wrap.querySelector('.lc-tip');
    const vline=svg.querySelector('.lc-vline');
    const show=(hit)=>{
      const x=parseFloat(hit.dataset.x),y=parseFloat(hit.dataset.y);
      const vb=svg.viewBox.baseVal;const rect=svg.getBoundingClientRect();
      const px=(x/vb.width)*rect.width, py=(y/vb.height)*rect.height;
      if(tip){tip.textContent=hit.dataset.l+': '+hit.dataset.v+'/10';tip.style.left=px+'px';tip.style.top=py+'px';tip.style.opacity='1';}
      if(vline){vline.setAttribute('x1',x);vline.setAttribute('x2',x);vline.style.opacity='0.5';}
    };
    const hide=()=>{if(tip)tip.style.opacity='0';if(vline)vline.style.opacity='0';};
    svg.querySelectorAll('.lc-hit').forEach(hit=>{
      hit.addEventListener('mouseenter',()=>show(hit));
      hit.addEventListener('mouseleave',hide);
      hit.addEventListener('touchstart',e=>{e.preventDefault();show(hit);},{passive:false});
    });
    svg.addEventListener('touchend',hide);
  });
}

// Ziel-Fortschritt berechnen (0–100%) — aus Konsistenz, Score-Trend, Streak
function goalProgress(){
  const H=S.history;
  if(H.length===0)return{pct:0,label:'Noch keine Daten',detail:'Mach deinen ersten Check-in.'};
  const avg=H.reduce((a,h)=>a+h.s,0)/H.length;
  const consistency=Math.min(1,H.length/30); // 30 Tage = volle Konsistenz
  const scoreComp=avg/10;
  const streakComp=Math.min(1,S.streak/21);
  const recent=H.slice(-7),older=H.slice(-14,-7);
  let trend=0;
  if(older.length>0){const r=recent.reduce((a,h)=>a+h.s,0)/recent.length,o=older.reduce((a,h)=>a+h.s,0)/older.length;trend=Math.max(0,Math.min(1,(r-o+2)/4));}
  else trend=0.5;
  const pct=Math.round((consistency*0.3+scoreComp*0.35+streakComp*0.2+trend*0.15)*100);
  let label,detail;
  if(pct>=80){label='Fast am Ziel!';detail='Du lebst dein System bereits. Weiter so.';}
  else if(pct>=55){label='Auf gutem Weg';detail='Dein System trägt dich. Bleib dran.';}
  else if(pct>=30){label='Du baust auf';detail='Die Grundlagen entstehen. Konsistenz ist jetzt alles.';}
  else{label='Am Anfang';detail='Jeder Check-in bringt dich näher. Der Anfang ist der schwerste Teil.';}
  return{pct,label,detail,avg:avg.toFixed(1)};
}

function buildInsights(){
  if(S.history.length<3)return'';
  const withSleep=S.history.filter(h=>h.sleep);
  if(withSleep.length>=3){
    const early=withSleep.filter(h=>h.sleep<='23:00');
    const late=withSleep.filter(h=>h.sleep>'23:00');
    if(early.length>0&&late.length>0){
      const ea=early.reduce((a,h)=>a+h.s,0)/early.length;
      const la=late.reduce((a,h)=>a+h.s,0)/late.length;
      if(Math.abs(ea-la)>1)return`An Tagen, wo du vor 23:00 Uhr einschläfst, ist dein Score im Schnitt ${(ea-la).toFixed(1)} Punkte ${ea>la?'höher':'niedriger'}. Der Zusammenhang zwischen Schlaf und Leistung ist bei dir klar sichtbar.`;
    }
  }
  const last3=S.history.slice(-3);
  const trend=last3[2].s-last3[0].s;
  if(trend>2)return`Deine letzten 3 Tage zeigen einen klaren Aufwärtstrend (+${trend} Punkte). Du bist gerade im Flow — nutze das.`;
  if(trend<-2)return`Die letzten 3 Tage waren schwächer. Das ist normal — wichtig ist, dass du heute trotzdem check-ins machst.`;
  return`Deine Scores sind konstant. Konsistenz ist die Basis — von hier aus wird es besser.`;
}

// ── WOCHEN-RÜCKBLICK ────────────────────────────────────
function buildWeeklyReview(){
  const H=S.history;const w=H.slice(-7);const prev=H.slice(-14,-7);
  const avg=w.length?w.reduce((a,h)=>a+h.s,0)/w.length:0;
  const pAvg=prev.length?prev.reduce((a,h)=>a+h.s,0)/prev.length:null;
  const ins=analyze();
  const gp=goalProgress();
  // Lernpunkte aus Fehlern
  const fails=w.filter(h=>h.fail).map(h=>h.fail);
  const diss=w.filter(h=>h.dis&&h.dis!=='Nichts').map(h=>h.dis);
  const lessons=[];
  if(fails.length){const cnt={};fails.forEach(f=>cnt[f]=(cnt[f]||0)+1);const t=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];lessons.push(`Diese Woche scheiterten Aufgaben ${t[1]}× an "${t[0]}". Nächste Woche: plane eine konkrete Gegenmaßnahme dafür ein.`);}
  if(diss.length){const cnt={};diss.forEach(d=>cnt[d]=(cnt[d]||0)+1);const t=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];if(t[1]>=2)lessons.push(`"${t[0]}" war dein häufigster Störfaktor. Eine feste Regel dagegen (z.B. Handy in anderen Raum) wirkt stärker als Willenskraft.`);}
  if(ins.length)lessons.push(ins[0].txt);
  return{avg,pAvg,ins,gp,lessons,w,trend:pAvg!==null?avg-pAvg:null};
}

  const ov=document.getElementById('rank-ov');if(!ov)return;
  const r=buildWeeklyReview();
  const n=S.profile.name||'du';
  const trendTxt=r.trend===null?'Deine erste Woche — der Maßstab für alles Weitere.':r.trend>0.3?`+${r.trend.toFixed(1)} besser als letzte Woche`:r.trend<-0.3?`${r.trend.toFixed(1)} unter letzter Woche`:'stabil zur Vorwoche';
  const trendCol=r.trend===null?'var(--ac)':r.trend>0.3?'var(--gr)':r.trend<-0.3?'var(--go)':'var(--so)';

  ov.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-family:var(--fd);font-weight:800;font-size:20px">Dein Wochen-Rückblick</div>
      <button id="wk-close" style="background:var(--su);border:1px solid var(--bo);border-radius:50%;width:32px;height:32px;color:var(--mu);font-size:16px;cursor:pointer;font-family:var(--fb)">×</button>
    </div>

      <div class="ca" style="text-align:center;padding:28px"><div class="think"><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="core"></div></div><div style="font-size:13px;color:var(--mu)">Dein Coach analysiert deine Woche</div></div>
    </div>`;
  ov.classList.add('open');
  document.getElementById('wk-close').onclick=()=>ov.classList.remove('open');

  // Build body content
  let coachText='';
  if(true){
    const ctx=`${n}, Ziel: "${S.profile.goal||'nicht gesetzt'}". Diese Woche: Ø Score ${r.avg.toFixed(1)}/10${r.pAvg!==null?` (Vorwoche ${r.pAvg.toFixed(1)})`:''}. Ziel-Fortschritt: ${r.gp.pct}%. Erkenntnisse: ${r.lessons.join(' | ')||'keine klaren Muster'}.`;

    const resp=await ai([{role:'user',content:ctx}],sys,'claude-sonnet-4-6');

  }

  const body=document.getElementById('wk-body');
  if(!body)return;
  body.innerHTML=`

    <div class="ca" style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:14px">

function localWeeklyText(r,n){
  const x=S.mentor==='streng';const o=[];
  // 1) Würdigung
  if(r.avg>=7.5)o.push(x?`${n}, Ø ${r.avg.toFixed(1)} diese Woche — starkes Niveau. Genau das ist der Standard.`:`${n}, was für eine Woche — Ø ${r.avg.toFixed(1)}! Du darfst stolz auf dich sein.`);
  else if(r.avg>=5)o.push(x?`Ø ${r.avg.toFixed(1)} diese Woche. Solide Basis, aber du weißt, dass mehr geht.`:`${n}, Ø ${r.avg.toFixed(1)} — eine ehrliche, durchschnittliche Woche. Das ist völlig okay.`);
  else o.push(x?`Ø ${r.avg.toFixed(1)}. Das war keine starke Woche, ${n}. Lass uns ehrlich draufschauen.`:`${n}, diese Woche war schwer — Ø ${r.avg.toFixed(1)}. Und trotzdem bist du hier und schaust zurück. Das zählt mehr, als du denkst.`);
  // 2) Lernfeld
  if(r.lessons.length)o.push('Dein wichtigstes Lernfeld: '+r.lessons[0]);
  // 3) Trend / Motivation auch ohne Fortschritt (Omas Punkt)
  if(r.trend!==null&&r.trend<0){
    o.push(x?'Der Score ist gefallen — aber Rückschritte gehören dazu. Entscheidend ist, dass du nicht aufhörst.':`Auch wenn die Zahlen diese Woche nicht nach oben zeigten: Fortschritt ist nicht immer sichtbar. Du baust gerade etwas auf, das unter der Oberfläche wächst — bleib dran, ${n}.`);
  }else if(r.trend===null){
    o.push(x?'Das ist dein Startpunkt. Ab hier zählt jede Woche.':`Dies ist erst der Anfang deiner Reise, ${n}. Jeder fängt genau hier an.`);
  }else{
    o.push(x?'Nächste Woche: gleiche Disziplin, ein Stück konsequenter.':`Nimm den Schwung mit in die neue Woche, ${n} — du hast bewiesen, dass du es kannst.`);
  }
  // 4) Ziel-Bezug + Konsistenz-Prinzip (Omas Punkt + realistische Erwartung)
  if(S.profile.goal){
    o.push(x?`Denk an dein Ziel: "${S.profile.goal}". Entscheidend ist nicht die perfekte Woche, sondern dass du Woche für Woche dranbleibst — Konsistenz bringt dich dahin, nicht Perfektion.`:`Dein Ziel — "${S.profile.goal}" — erreichst du nicht durch perfekte Tage, sondern dadurch, dass du immer wieder zurückkommst. Genau das tust du gerade. Das ist echter Fortschritt, auch wenn er sich noch nicht groß anfühlt.`);
  }
  // 5) konkreter Fokus
  o.push(x?`Dein Fokus für nächste Woche: ${r.lessons.length?'die obige Schwachstelle gezielt angehen.':'Konsistenz halten, keine Lücken.'}`:`Ein kleiner Fokus für nächste Woche reicht: ${r.lessons.length?'die eine Sache oben verbessern.':'einfach dranbleiben — Tag für Tag.'} Du schaffst das.`);
  return o.join(' ');
}

function cleanSpotlight(){const c=document.getElementById('spcv');if(c)c.remove();}

function createSpotlight(el){
  cleanSpotlight();if(!el)return;
  const dpr=window.devicePixelRatio||1;
  const cv=document.createElement('canvas');cv.id='spcv';
  cv.style.cssText=`position:fixed;inset:0;z-index:8100;pointer-events:none`;
  cv.style.width=window.innerWidth+'px';cv.style.height=window.innerHeight+'px';
  cv.width=Math.round(window.innerWidth*dpr);cv.height=Math.round(window.innerHeight*dpr);
  document.body.appendChild(cv);
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  const rc=el.getBoundingClientRect();
  const pad=10,r=Math.min(16,rc.height/2);
  const x=rc.left-pad,y=rc.top-pad,w=rc.width+pad*2,h=rc.height+pad*2;
  // dark overlay everywhere
  ctx.fillStyle='rgba(4,5,20,.86)';ctx.fillRect(0,0,window.innerWidth,window.innerHeight);
  // cut out the element
  function rr(ctx2){ctx2.beginPath();ctx2.moveTo(x+r,y);ctx2.lineTo(x+w-r,y);ctx2.quadraticCurveTo(x+w,y,x+w,y+r);ctx2.lineTo(x+w,y+h-r);ctx2.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx2.lineTo(x+r,y+h);ctx2.quadraticCurveTo(x,y+h,x,y+h-r);ctx2.lineTo(x,y+r);ctx2.quadraticCurveTo(x,y,x+r,y);ctx2.closePath();}
  ctx.globalCompositeOperation='destination-out';rr(ctx);ctx.fill();
  // glowing border
  ctx.globalCompositeOperation='source-over';
  ctx.strokeStyle='#6B7CFF';ctx.lineWidth=2.5;ctx.shadowColor='#6B7CFF';ctx.shadowBlur=28;
  rr(ctx);ctx.stroke();
  // second pass for stronger glow
  ctx.shadowBlur=12;rr(ctx);ctx.stroke();
}

// Scroll element to be fully visible in #sc without animation
function scrollToEl(el){
  const sc=document.getElementById('sc');const ph=document.getElementById('ph');
  if(!sc||!ph||!el)return;
  const scRect=sc.getBoundingClientRect();const elRect=el.getBoundingClientRect();
  const elTopInSc=elRect.top-scRect.top;
  const elBotInSc=elRect.bottom-scRect.top;
  const scH=scRect.height;const margin=16;
  if(elTopInSc<margin){
    sc.scrollTop+=elTopInSc-margin;
  } else if(elBotInSc>scH-margin){
    sc.scrollTop+=elBotInSc-(scH-margin);
  }
}

function positionTutCard(el,step){
  const sheet=document.getElementById('tut-sheet');const ph=document.getElementById('ph');
  if(!sheet||!ph)return;
  sheet.style.top='';sheet.style.bottom='';
  const NAV=66,SB=52;
  if(!el){sheet.style.bottom=NAV+'px';return;}
  // measure element position relative to ph AFTER scroll settled
  const elRect=el.getBoundingClientRect();const phRect=ph.getBoundingClientRect();
  const elMidRel=(elRect.top+elRect.height/2)-phRect.top;
  const phMid=phRect.height/2;
  if(elMidRel>phMid){
    // lower half → card at top
    sheet.style.top=SB+'px';
  } else {
    // upper half → card at bottom
    sheet.style.bottom=NAV+'px';
  }
}

function lockTutScroll(){

function confetti(){
  const mfm=document.getElementById('mfm');const rc=mfm.getBoundingClientRect();
  const cv=document.createElement('canvas');
  cv.style.cssText=`position:fixed;top:${rc.top}px;left:${rc.left}px;width:${rc.width}px;height:${rc.height}px;pointer-events:none;z-index:9999;border-radius:22px`;
  cv.width=rc.width;cv.height=rc.height;document.body.appendChild(cv);
  const ctx=cv.getContext('2d');
  const cols=['#6B7CFF','#2DD4A0','#F5A623','#B07AFF','#38C8F5','#FF6B75','#fff'];
  const ps=Array.from({length:90},()=>({x:Math.random()*cv.width,y:-12,w:Math.random()*9+4,h:Math.random()*4+3,c:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-.5)*2.8,vy:Math.random()*3.5+1.8,rot:Math.random()*360,rv:(Math.random()-.5)*6,op:1}));
  let f=0;
  (function draw(){ctx.clearRect(0,0,cv.width,cv.height);ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;if(f>65)p.op=Math.max(0,p.op-.016);ctx.save();ctx.globalAlpha=p.op;ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});if(++f<140)requestAnimationFrame(draw);else cv.remove();})();
}

// ── LOKALE ENGINES (0 € API-Kosten) ─────────────────────
function localPlanFromText(t){
  if(!t||!t.trim())return[];
  // Satzzeichen + Konjunktionen als Trenner
  let raw=t.replace(/\bund danach\b|\bdanach\b|\bund dann\b|\bdann\b|\bund anschließend\b|\banschließend\b|\bdaraufhin\b/gi,'|')
           .replace(/\bund\b/gi,'|')
           .split(/[|\n.;•·,]+/);
  const stop=/^(ich|heute|möchte|will|werde|muss|sollte|mir|mich|noch|auch|dann|erst|zuerst|nehme|vor|mein|meine|am|im|um|den|die|das|ein|eine|zu|ins|in|nach|vor|bis)$/i;
  const tasks=[];
  raw.forEach(seg=>{
    seg=seg.trim();if(seg.length<2)return;
    // Entferne Einleitungs-Floskeln
    seg=seg.replace(/^(ich (möchte|will|werde|muss|sollte)|heute( möchte ich| will ich| nehme ich mir vor:?)?|als erstes|zuerst|erst(mal)?|dann|danach|außerdem|zudem|auch noch|noch|und)\s+/i,'');
    seg=seg.replace(/\s+/g,' ').trim();
    if(!seg||stop.test(seg))return;
    // Verb am Satzanfang → Infinitiv-Stichpunkt
    // "ins gym gehen" bleibt; "gehe ins gym" → "Ins Gym gehen"
    // "lerne ich X" / "gehe ich X" → entferne Pronomen, Verb in Infinitiv
    seg=seg.replace(/^(gehe|geh)\s+ich\s+/i,'').replace(/^(lerne|lern)\s+ich\s+/i,'Lernen: ').replace(/^(mache|mach)\s+ich\s+/i,'').replace(/^\w+\s+ich\s+/i,'');
    seg=seg.replace(/^gehe\b/i,'gehen').replace(/^mache\b/i,'machen').replace(/^lerne\b/i,'lernen');
    // Großschreibung erstes Wort
    seg=seg.charAt(0).toUpperCase()+seg.slice(1);
    // Kürzen
    if(seg.length>50)seg=seg.slice(0,50).trim();
    tasks.push(seg);
  });
  // Dedupe
  const seen=new Set();const out=[];
  tasks.forEach(t=>{const key=t.toLowerCase();if(!seen.has(key)){seen.add(key);out.push(t);}});
  return out.slice(0,6);
}
function avgS(a){return a.reduce((x,h)=>x+h.s,0)/a.length;}
function analyze(){
  const H=S.history;if(H.length<3)return[];
  const ins=[];
  const ws=H.filter(h=>h.sleep);
  if(ws.length>=4){
    const e=ws.filter(h=>h.sleep<='23:00'),l=ws.filter(h=>h.sleep>'23:00');
    if(e.length>=2&&l.length>=2){const d=avgS(e)-avgS(l);
      if(Math.abs(d)>=1)ins.push({w:Math.abs(d),txt:`An Tagen, an denen du vor 23 Uhr schläfst, ist dein Score im Schnitt ${Math.abs(d).toFixed(1)} Punkte ${d>0?'höher':'niedriger'}. Schlaf ist bei dir ein direkter Leistungshebel.`});}
  }
  const hq=H.filter(h=>h.slq>=4),lq=H.filter(h=>h.slq&&h.slq<=2);
  if(hq.length>=2&&lq.length>=2){const d=avgS(hq)-avgS(lq);
    if(d>=1)ins.push({w:d,txt:`Gute Schlafqualität bringt dir im Schnitt +${d.toFixed(1)} Punkte auf deinen Tages-Score. Dein Abendritual ist wichtiger als du denkst.`});}
  const he=H.filter(h=>h.en>=4),le=H.filter(h=>h.en&&h.en<=2);
  if(he.length>=2&&le.length>=2){const d=avgS(he)-avgS(le);
    if(d>=1.2)ins.push({w:d*0.9,txt:`Tage mit hoher Energie liegen ${d.toFixed(1)} Punkte über Tagen mit niedriger. Frage dich: Was gibt dir morgens Energie — und was raubt sie dir?`});}
  const dis=H.filter(h=>h.dis&&h.dis!=='Nichts').map(h=>h.dis);
  if(dis.length>=3){const cnt={};dis.forEach(d=>cnt[d]=(cnt[d]||0)+1);
    const top=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];
    if(top[1]/dis.length>=0.4)ins.push({w:top[1]/dis.length*2,txt:`${Math.round(top[1]/dis.length*100)}% deiner Ablenkungen gehen auf ${top[0]} zurück. Eine gezielte Regel dagegen bringt mehr als jede Motivation.`});}
  const fl=H.filter(h=>h.fail).map(h=>h.fail);
  if(fl.length>=3){const cnt={};fl.forEach(f=>cnt[f]=(cnt[f]||0)+1);
    const top=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];
    if(top[1]>=2)ins.push({w:top[1]/fl.length*1.8,txt:`Wenn deine Pläne scheitern, dann meistens an: ${top[0]} (${top[1]}× erfasst). Plane das beim nächsten Tagesplan aktiv mit ein, statt dagegen anzukämpfen.`});}
  if(H.length>=7){
    const byWd={};H.forEach(h=>{if(h.wd!==undefined){(byWd[h.wd]=byWd[h.wd]||[]).push(h.s);}});
    const D=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
    const av=Object.entries(byWd).filter(([k,v])=>v.length>=2).map(([k,v])=>[k,v.reduce((a,b)=>a+b,0)/v.length]);
    if(av.length>=3){av.sort((a,b)=>b[1]-a[1]);const b1=av[0],w1=av[av.length-1];
      if(b1[1]-w1[1]>=1.5)ins.push({w:(b1[1]-w1[1])*0.7,txt:`${D[b1[0]]} ist dein stärkster Tag (Ø ${b1[1].toFixed(1)}), ${D[w1[0]]} dein schwächster (Ø ${w1[1].toFixed(1)}). Lege wichtige Aufgaben auf deine starken Tage.`});}
  }
  return ins.sort((a,b)=>b.w-a.w);
}
function insightCard(){
  const H=S.history;
  if(H.length===0)return'';
  if(H.length<3)return`<div class="ca al" style="margin-bottom:10px"><div class="lb" style="color:var(--ac)">🔍 MUSTER-ANALYSE</div><p style="font-size:12px;color:var(--so);line-height:1.6;margin-bottom:8px">Noch <strong style="color:var(--tx)">${3-H.length} Abend-Check-in${3-H.length>1?'s':''}</strong> bis zu deiner ersten persönlichen Erkenntnis.</p><div class="pb"><div class="pf" style="width:${Math.round(H.length/3*100)}%;background:var(--ac)"></div></div></div>`;

// ── CLOCK
function tick(){const el=document.getElementById('clk');if(el)el.textContent=fmtTime();}
setInterval(tick,30000);tick();

// ── PERSISTENCE ─────────────────────────────────────────
const SK='mfm_v4';

// API Key aus localStorage laden (einmalig setzen, dann immer da)

// Felder die dauerhaft gespeichert bleiben (über Tage hinweg)
const PERSIST=['profile','mentor','monthGoals','habits','notifs','partner',
  'partnerCode','referralCode','referralCount','taskTemplate','ach',
  'waveCount','history','streak','isPremium','planType','chIdx','qidx',
  'chAccepted'];

// Felder die täglich zurückgesetzt werden
const DAILY=['tasks','pt','tg','mood','sleep',
  'mp','mq','ma','mc','mf','md',
  'ep','eq','ea','ec','ef','ed',
  'tmSecs','tmSessions','tmTaskIdx','shieldUsed','chDone'];

function saveState(){
  try{
    const s={};
    PERSIST.forEach(k=>{s[k]=S[k];});
    DAILY.forEach(k=>{s[k]=S[k];});
    s._date=new Date().toDateString();
    s._sc=S.sc==='ob'?'d':S.sc; // never save onboarding screen
    localStorage.setItem(SK,JSON.stringify(s));
  }catch(e){}
}

function loadState(){
  try{
    const raw=localStorage.getItem(SK);
    if(!raw)return false; // kein gespeicherter Zustand → Onboarding
    const sv=JSON.parse(raw);
    const today=new Date().toDateString();
    const newDay=sv._date!==today;

    // Dauerhaftes Profil laden
    PERSIST.forEach(k=>{if(sv[k]!==undefined)S[k]=sv[k];});

    // notifs Migrations-Fix (alter Format: {morning:true} → neuer Format: {morning:{on:true,time:'08:00'}})
    if(S.notifs&&typeof S.notifs.morning==='boolean'){
      S.notifs={
        morning:{on:S.notifs.morning,time:'08:00'},
        noon:{on:S.notifs.noon!==false,time:'13:00'},
        evening:{on:S.notifs.evening!==false,time:'23:15'}
      };
    }

    if(!newDay){
      // Gleicher Tag → alles wiederherstellen
      DAILY.forEach(k=>{if(sv[k]!==undefined)S[k]=sv[k];});
    } else {
      // Neuer Tag → tägliche Felder zurücksetzen
      S.tasks=[];S.pt='';S.tg=false;
      S.mood=null;S.sleep='';
      S.mp='intro';S.mq=0;S.ma=[];S.mc='';S.mf='';S.md=false;
      S.ep='intro';S.eq=0;S.ea=[];S.ec='';S.ef='';S.ed=false;
      S.tmSecs=(S.tmMin||25)*60;S.tmSessions=0;S.tmTaskIdx=-1;
      S.shieldUsed=false;S.chDone=false;S.waveToday=false;
      // Habits: Häkchen zurücksetzen, Gewohnheiten behalten
      S.habits=S.habits.map(h=>({...h,ck:false}));
      // Zitat des Tages wechseln
      S.qidx=(S.qidx+1)%QUOTES.length;
    }

    // Timer immer zurücksetzen (kann nach Reload nicht fortgeführt werden)
    S.tmActive=false;S.tmInterval=null;S.tl=false;

    // Startscreen setzen
    S.sc=S.profile.name?((sv._sc&&sv._sc!=='ob')?sv._sc:'d'):'ob';
    S.tut=0; // Tutorial nicht erneut zeigen

    return true;
  }catch(e){console.log('loadState:',e);return false;}
}

function clearAllData(){
  if(!confirm('Alle gespeicherten Daten wirklich löschen? Dies kann nicht rückgängig gemacht werden.'))return;
  try{localStorage.removeItem(SK);}catch(e){}
  location.reload();
}

// ── START ────────────────────────────────────────────────
loadState();
R();

// ── PWA SERVICE WORKER ──
if('serviceWorker'in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
